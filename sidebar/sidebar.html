<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI 翻译 & 摘要</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="tabs">
        <button class="tab active" data-tab="summary">摘要</button>
        <button class="tab" data-tab="translation">翻译</button>
      </div>
    </div>
    <div id="content">
      <div id="panel-summary" class="panel active">
        <div class="placeholder">点击扩展图标中的"摘要"或"全部"按钮开始</div>
      </div>
      <div id="panel-translation" class="panel">
        <div class="placeholder">点击扩展图标中的"翻译"或"全部"按钮开始</div>
      </div>
    </div>
  </div>
  <script src="sidebar.js"></script>
</body>
</html>
