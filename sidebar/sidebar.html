<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PageGrep</title>
    <!-- Load order matters: storage-keys → theme-utils → i18n-override → theme → i18n → page script -->
    <script src="../shared/storage-keys.js"></script>  <!-- defines STORAGE_KEYS -->
    <script src="../shared/theme-utils.js"></script>   <!-- defines isThemeDark(); no dependencies -->
    <script src="../shared/i18n-override.js"></script> <!-- uses STORAGE_KEYS -->
    <script src="../shared/theme.js"></script>         <!-- uses STORAGE_KEYS, isThemeDark() -->
    <link rel="stylesheet" href="sidebar.css" />
  </head>
  <body style="visibility:hidden">
    <header class="app-header">
      <nav class="tab-nav">
        <div class="tabs-left">
          <button id="tab-summary" class="tab-btn active" data-tab="summary" data-i18n="summaryTab">摘要</button>
          <button id="tab-interests" class="tab-btn" data-tab="interests" data-i18n="interestsTab">兴趣</button>
        </div>
        <button id="options-btn" class="icon-btn" data-i18n-title="advancedSettings" data-i18n-aria-label="advancedSettings" title="高级设置" aria-label="高级设置">⚙</button>
      </nav>
    </header>

    <main id="main-content">
      <div id="global-error" class="error hidden"></div>
      <div id="reader-mode-notice" class="reader-notice hidden" data-i18n="readerModeNotice">Reader mode active — summary and highlights analyze the reader content</div>
      <section id="summary-tab" class="tab-content active">
        <div class="tab-actions">
          <button id="summary-btn" class="primary-btn" data-i18n="generateSummary">生成摘要</button>
        </div>
        <div id="summary-list" class="summary-list"></div>
        <div id="summary-empty" class="empty" data-i18n="summaryPlaceholder">点击上方按钮生成页面摘要</div>
      </section>

      <section id="interests-tab" class="tab-content">
        <div id="interests-config" class="interests-config">
          <div id="pills-container" class="pills-container"></div>
          <div class="pill-input-wrap">
            <input type="text" id="interests-input" class="pill-input" data-i18n-placeholder="interestsPlaceholder" placeholder="描述你感兴趣的内容，如：AI科技..." maxlength="60" />
            <button id="add-interest-btn" class="pill-add-btn">+</button>
          </div>
          <span id="interests-status" class="status-msg hidden" data-i18n="saved">已保存 ✓</span>
        </div>
        <div class="tab-actions">
          <button id="highlight-btn" class="primary-btn" data-i18n="findMatches">查找匹配</button>
        </div>
        <div id="highlight-list" class="summary-list"></div>
        <div id="highlight-empty" class="empty" data-i18n="matchesPlaceholder">点击上方按钮查找感兴趣的内容</div>
      </section>
    </main>

    <footer class="app-footer">
      <div class="toggle-row" data-i18n-title="toggleTheme" title="切换深色/浅色模式">
        <label class="switch">
          <input type="checkbox" id="theme-toggle">
          <span class="slider"></span>
        </label>
        <span class="toggle-label" data-i18n="darkMode">深色模式</span>
      </div>
      <div class="toggle-row" data-i18n-title="floatBtnTooltip" title="在页面右下角显示浮动操作按钮">
        <label class="switch">
          <input type="checkbox" id="show-float-btn">
          <span class="slider"></span>
        </label>
        <span class="toggle-label" data-i18n="floatBtn">浮动按钮</span>
      </div>
      <div class="toggle-row hidden" id="hide-on-site-row" style="border-top: 1px solid var(--border); padding-top: 12px; margin-top: 0;">
        <label class="switch">
          <input type="checkbox" id="hide-on-site-toggle">
          <span class="slider"></span>
        </label>
        <span class="toggle-label" data-i18n="hideOnThisSite">Hide on this site</span>
      </div>
    </footer>

    <script src="../shared/i18n.js"></script>
    <script src="sidebar.js"></script>
  </body>
</html>
