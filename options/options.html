<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 阅读助手 - 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div id="app">
    <header>
      <img src="../icons/icon-48.svg" alt="icon" width="32" height="32">
      <div>
        <h1>AI 阅读助手</h1>
        <p>设置您的 OpenAI API 密钥</p>
      </div>
    </header>

    <main>
      <form id="settings-form">
        <div class="form-group">
          <label for="api-key">OpenAI API Key</label>
          <div class="input-row">
            <input
              type="password"
              id="api-key"
              placeholder="sk-..."
              autocomplete="off"
              spellcheck="false"
            >
            <button type="button" id="toggle-visibility" title="显示/隐藏">👁</button>
          </div>
          <small>您的 API Key 仅存储在本地浏览器中，不会发送到任何第三方服务器。</small>
        </div>

        <div class="form-group">
          <label for="model-select">AI 模型</label>
          <select id="model-select">
            <option value="gpt-4o-mini">gpt-4o-mini（推荐，低成本）</option>
            <option value="gpt-4o">gpt-4o（更高质量）</option>
            <option value="gpt-4.1-mini">gpt-4.1-mini（最新轻量）</option>
          </select>
          <small>gpt-4o-mini 适合日常使用，成本约为 $0.15/百万输入tokens。</small>
        </div>

        <div class="form-actions">
          <button type="submit" id="save-btn" class="btn-primary">保存设置</button>
          <button type="button" id="clear-btn" class="btn-danger">清除 API Key</button>
        </div>
      </form>

      <div id="save-status" class="hidden"></div>

      <div class="info-box">
        <h3>使用说明</h3>
        <ol>
          <li>在 <a href="https://platform.openai.com/api-keys" target="_blank">OpenAI 平台</a> 获取 API Key</li>
          <li>将 API Key 粘贴到上方输入框并保存</li>
          <li>访问任意网页，点击扩展图标开启悬浮按钮</li>
          <li>使用页面右下角的悬浮按钮翻译或高亮感兴趣的内容</li>
        </ol>
      </div>
    </main>
  </div>
  <script src="options.js"></script>
</body>
</html>
